appId: com.nion.desktop
productName: Nion
copyright: Copyright © 2026 Nion Team

directories:
  output: dist-electron
  buildResources: build

files:
  - dist/**/*
  - package.json

# macOS 配置
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

# Windows 配置
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

# Linux 配置
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png
  category: Development

# NSIS 安装程序配置（Windows）
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true

# DMG 配置（macOS）
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
