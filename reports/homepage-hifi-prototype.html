<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nion 首页高保真原型</title>
    <style>
      :root {
        --bg: #f5f3ed;
        --surface: #f8f7f3;
        --surface-strong: #ffffff;
        --text: #171717;
        --text-muted: #646464;
        --border: #e8e3d8;
        --border-strong: #dcd5c8;
        --hover: #efebe2;
        --primary: #1f8f5f;
        --primary-soft: #d6f2e3;
        --shadow: 0 1px 2px rgba(14, 18, 16, 0.06), 0 10px 28px rgba(14, 18, 16, 0.05);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          "Noto Sans CJK SC",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        min-height: 100vh;
      }

      .app {
        display: grid;
        grid-template-columns: 304px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.44), rgba(255, 255, 255, 0.2));
        border-right: 1px solid var(--border);
        padding: 18px 14px 14px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-width: 0;
      }

      .mac-dots {
        display: inline-flex;
        gap: 8px;
        margin-left: 4px;
      }

      .mac-dots span {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .dot-red {
        background: #ff5f56;
      }

      .dot-yellow {
        background: #ffbd2e;
      }

      .dot-green {
        background: #27c93f;
      }

      .brand {
        margin-top: 8px;
        padding: 6px 10px 2px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 33px;
        font-family: "Times New Roman", Georgia, serif;
        letter-spacing: 0.2px;
      }

      .brand-badge {
        width: 20px;
        height: 20px;
        border-radius: 6px;
        border: 1px solid var(--border-strong);
        display: grid;
        place-items: center;
        font-size: 11px;
        color: #7a7a7a;
        font-family: inherit;
      }

      .new-chat {
        height: 42px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #faf8f2;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        padding: 0 14px;
        font-size: 30px;
        font-weight: 600;
        cursor: pointer;
      }

      .new-chat:hover {
        background: #f2eee5;
      }

      .nav-group {
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        padding: 10px 0;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 12px;
        border-radius: 10px;
        color: #555;
        font-size: 31px;
        line-height: 1;
        cursor: pointer;
      }

      .nav-item.active {
        background: #eae6dc;
        color: #131313;
        font-weight: 600;
      }

      .nav-item:hover {
        background: var(--hover);
      }

      .icon {
        width: 22px;
        height: 22px;
        border-radius: 5px;
        border: 1px solid var(--border-strong);
        display: grid;
        place-items: center;
        font-size: 12px;
        color: #7d7d7d;
      }

      .recent {
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .recent-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #6a6a6a;
        font-size: 25px;
        font-weight: 600;
        padding: 6px 12px 2px;
      }

      .recent-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .chat-row {
        border-radius: 10px;
        padding: 9px 12px;
        display: grid;
        gap: 4px;
        cursor: pointer;
      }

      .chat-row:hover {
        background: #f0ece3;
      }

      .chat-row.active {
        background: #ece7dc;
      }

      .chat-title {
        font-size: 29px;
        font-weight: 600;
        line-height: 1.25;
      }

      .chat-preview {
        font-size: 25px;
        color: #777;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-meta {
        font-size: 22px;
        color: #9a9a9a;
      }

      .sidebar-footer {
        margin-top: auto;
        border-top: 1px solid var(--border);
        padding: 12px 10px 4px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #666;
        font-size: 28px;
      }

      .main {
        position: relative;
        min-width: 0;
        padding: 20px 30px 36px;
      }

      .top-actions {
        display: flex;
        justify-content: flex-end;
      }

      .workdir {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.55);
        border-radius: 12px;
        padding: 9px 13px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #5f5f5f;
        font-size: 28px;
        cursor: pointer;
      }

      .workdir:hover {
        background: #f4f0e8;
      }

      .hero-wrap {
        max-width: 980px;
        margin: 122px auto 0;
        position: relative;
      }

      .halo {
        pointer-events: none;
        position: absolute;
        inset: -40px 80px auto;
        height: 170px;
        border-radius: 999px;
        background: radial-gradient(ellipse at center, rgba(146, 203, 171, 0.24), rgba(146, 203, 171, 0.08) 52%, transparent 80%);
        filter: blur(20px);
      }

      .hero {
        position: relative;
        text-align: center;
        display: grid;
        gap: 15px;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(56px, 5vw, 86px);
        line-height: 1.08;
        letter-spacing: -0.04em;
        font-weight: 700;
      }

      .hero p {
        margin: 0 auto;
        max-width: 740px;
        color: var(--text-muted);
        font-size: clamp(28px, 1.6vw, 34px);
        line-height: 1.7;
      }

      .mode-area {
        margin-top: 18px;
        display: grid;
        justify-items: center;
        gap: 11px;
      }

      .mode-switch {
        border-radius: 999px;
        padding: 6px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.5);
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        min-width: 390px;
        box-shadow: 0 2px 8px rgba(20, 28, 20, 0.04);
      }

      .mode-btn {
        border: 0;
        background: transparent;
        border-radius: 999px;
        padding: 13px 18px;
        color: #6d6d6d;
        font-size: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
      }

      .mode-btn.active {
        background: var(--primary-soft);
        color: #155a3f;
        box-shadow: 0 8px 18px rgba(35, 151, 99, 0.2);
        font-weight: 600;
      }

      .mode-hint {
        font-size: 23px;
        color: #6e6e6e;
      }

      .composer {
        margin: 20px auto 0;
        width: min(100%, 1060px);
        border: 1px solid var(--border);
        border-radius: 26px;
        background: var(--surface-strong);
        box-shadow: var(--shadow);
        padding: 16px 18px 14px;
      }

      .composer textarea {
        width: 100%;
        border: 0;
        outline: 0;
        resize: none;
        min-height: 96px;
        background: transparent;
        color: #232323;
        font-size: 30px;
        line-height: 1.5;
      }

      .composer textarea::placeholder {
        color: #9a9a9a;
      }

      .composer-bottom {
        margin-top: 6px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .tools {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .tool-chip {
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #faf8f3;
        padding: 7px 12px;
        font-size: 23px;
        color: #666;
      }

      .send-area {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .model {
        font-size: 24px;
        color: #555;
      }

      .send-btn {
        width: 48px;
        height: 48px;
        border-radius: 999px;
        border: 1px solid var(--border-strong);
        background: #f4f1e9;
        color: #565656;
        font-size: 28px;
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .send-btn:hover {
        background: #ede8de;
      }

      .quick {
        margin-top: 14px;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .quick button {
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #f8f5ed;
        padding: 8px 16px;
        font-size: 23px;
        color: #666;
        cursor: pointer;
      }

      .quick button:hover {
        background: #f0ebdf;
      }

      .mobile-header {
        display: none;
      }

      @media (max-width: 1080px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          display: none;
        }

        .main {
          padding: 14px 14px 30px;
        }

        .mobile-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 8px;
          padding: 4px 2px;
        }

        .mobile-brand {
          font-family: "Times New Roman", Georgia, serif;
          font-size: 34px;
        }

        .mobile-actions {
          display: inline-flex;
          gap: 8px;
        }

        .mobile-actions button {
          border: 1px solid var(--border);
          background: rgba(255, 255, 255, 0.55);
          border-radius: 12px;
          padding: 7px 10px;
          font-size: 22px;
          color: #666;
        }

        .hero-wrap {
          margin-top: 48px;
        }

        .mode-switch {
          min-width: 0;
          width: 100%;
          max-width: 460px;
        }

        .composer {
          border-radius: 20px;
          padding: 13px 12px 10px;
        }

        .composer textarea {
          min-height: 84px;
          font-size: 26px;
        }

        .tool-chip {
          font-size: 21px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="mac-dots">
          <span class="dot-red"></span>
          <span class="dot-yellow"></span>
          <span class="dot-green"></span>
        </div>

        <div class="brand">
          <span>Nion</span>
          <span class="brand-badge">〈</span>
        </div>

        <button class="new-chat">＋ 新对话</button>

        <div class="nav-group">
          <div class="nav-item active"><span class="icon">◻</span>对话</div>
          <div class="nav-item"><span class="icon">◎</span>智能体</div>
          <div class="nav-item"><span class="icon">▣</span>资讯</div>
          <div class="nav-item"><span class="icon">◔</span>定时任务</div>
        </div>

        <section class="recent">
          <div class="recent-head"><span>最近的对话</span><span>✓</span></div>
          <div class="recent-list">
            <article class="chat-row active">
              <div class="chat-title">Untitled</div>
              <div class="chat-preview">你好 我叫张天成，我喜欢编程和产品设计…</div>
              <div class="chat-meta">2 分钟前</div>
            </article>
            <article class="chat-row">
              <div class="chat-title">今天天气咋样</div>
              <div class="chat-preview">你问了杭州今天的天气和出行建议…</div>
              <div class="chat-meta">今天 09:42</div>
            </article>
            <article class="chat-row">
              <div class="chat-title">今天天气怎么样</div>
              <div class="chat-preview">建议穿着：轻薄外套 + 长裤，晚间略凉…</div>
              <div class="chat-meta">昨天 21:15</div>
            </article>
          </div>
        </section>

        <footer class="sidebar-footer">
          <span>⚙ 设置和更多</span>
          <span>⌄</span>
        </footer>
      </aside>

      <main class="main">
        <header class="mobile-header">
          <div class="mobile-brand">Nion</div>
          <div class="mobile-actions">
            <button>新对话</button>
            <button>目录</button>
          </div>
        </header>

        <div class="top-actions">
          <button class="workdir">📁 工作目录</button>
        </div>

        <section class="hero-wrap">
          <div class="halo"></div>
          <div class="hero">
            <h1>👋 你好，欢迎回来！</h1>
            <p>一念之间，万事即达。你的专属 AI 智能助手，懂你所想，为你而行。</p>
            <p>耗费繁琐操作，只需一个念头，工作与生活，皆可轻松托付。</p>
          </div>

          <div class="mode-area">
            <div class="mode-switch" role="tablist" aria-label="模式切换">
              <button class="mode-btn active" data-mode="safe">🛡 安全模式</button>
              <button class="mode-btn" data-mode="desktop">🖥 桌面模式</button>
            </div>
            <div class="mode-hint" id="modeHint">推荐：日常对话与知识任务（更稳健）</div>
          </div>

          <section class="composer">
            <textarea placeholder="今天我能为你做些什么？"></textarea>
            <div class="composer-bottom">
              <div class="tools">
                <span class="tool-chip">📎 上下文</span>
                <span class="tool-chip">🧩 技能</span>
                <span class="tool-chip">🔧 MCP</span>
                <span class="tool-chip">⚡ 闪速</span>
              </div>
              <div class="send-area">
                <span class="model">MiniMax-M2.5</span>
                <button class="send-btn">↑</button>
              </div>
            </div>
          </section>

          <div class="quick">
            <button>✨ 小惊喜</button>
            <button>✍ 写作</button>
            <button>🔬 研究</button>
            <button>📚 学习</button>
            <button>＋ 创建</button>
          </div>
        </section>
      </main>
    </div>

    <script>
      const modeHint = document.getElementById("modeHint");
      const modeButtons = document.querySelectorAll(".mode-btn");
      const hints = {
        safe: "推荐：日常对话与知识任务（更稳健）",
        desktop: "适合：需要本机文件与工作目录协作的任务",
      };

      modeButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          modeButtons.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          const mode = btn.dataset.mode || "safe";
          modeHint.textContent = hints[mode];
        });
      });
    </script>
  </body>
</html>
