<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nion 智能体列表 - 高保真原型</title>
    <style>
      :root {
        --bg: oklch(0.982 0.007 85);
        --card: oklch(0.998 0.005 85);
        --line: oklch(0.9 0.01 85);
        --line-strong: oklch(0.84 0.013 85);
        --text: oklch(0.21 0.012 85);
        --muted: oklch(0.52 0.012 85);
        --primary: oklch(0.28 0.02 85);
        --primary-soft: oklch(0.94 0.016 85);
        --ok: oklch(0.72 0.17 150);
        --warn: oklch(0.76 0.17 92);
        --off: oklch(0.68 0.02 85);
        --danger: oklch(0.61 0.22 27);
        --shadow: 0 20px 45px -32px oklch(0.2 0.02 85 / 0.42);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--text);
        font-family: "Manrope", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background: var(--bg);
      }

      body {
        position: relative;
        overflow-x: hidden;
      }

      .bg-art {
        position: fixed;
        inset: 0;
        z-index: -2;
        background:
          radial-gradient(1200px 700px at -5% -15%, oklch(0.9 0.04 85 / 0.36), transparent 58%),
          radial-gradient(900px 560px at 108% 5%, oklch(0.93 0.03 80 / 0.28), transparent 52%),
          linear-gradient(180deg, oklch(0.988 0.007 85), oklch(0.975 0.009 85));
      }

      .grain {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        opacity: 0.34;
        background-image:
          radial-gradient(oklch(0.34 0.03 85 / 0.1) 0.7px, transparent 0.7px),
          radial-gradient(oklch(0.3 0.02 85 / 0.1) 0.7px, transparent 0.7px);
        background-position: 0 0, 10px 10px;
        background-size: 20px 20px;
      }

      .page {
        width: min(1380px, 94vw);
        margin: 34px auto 52px;
      }

      .hero {
        border: 1px solid var(--line);
        background: linear-gradient(125deg, oklch(1 0.005 85 / 0.88), oklch(0.985 0.008 85 / 0.9));
        border-radius: 26px;
        box-shadow: var(--shadow);
        padding: 28px 30px;
        position: relative;
        overflow: hidden;
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -80px;
        top: -70px;
        width: 260px;
        height: 220px;
        border-radius: 120px;
        background: radial-gradient(circle at 50% 45%, oklch(0.91 0.02 83 / 0.8), transparent 70%);
      }

      .hero-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .hero h1 {
        margin: 2px 0 5px;
        font-size: clamp(24px, 3vw, 34px);
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .create-btn {
        border: 1px solid oklch(0.22 0.015 85 / 0.14);
        background: var(--text);
        color: #fff;
        border-radius: 999px;
        font-size: 13px;
        padding: 10px 14px;
        min-width: 102px;
        cursor: pointer;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }

      .create-btn:hover {
        opacity: 0.92;
        transform: translateY(-1px);
      }

      .toolbar {
        margin-top: 22px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .search {
        display: flex;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: oklch(1 0.004 85 / 0.9);
        height: 44px;
        padding: 0 12px;
        gap: 10px;
      }

      .search svg {
        width: 16px;
        height: 16px;
        color: var(--muted);
      }

      .search input {
        border: 0;
        outline: 0;
        width: 100%;
        background: transparent;
        color: var(--text);
        font-size: 14px;
      }

      .search input::placeholder {
        color: oklch(0.62 0.012 85);
      }

      .meta-pills {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .pill {
        height: 32px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: oklch(1 0.004 85 / 0.85);
        color: var(--muted);
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        font-size: 12px;
        letter-spacing: 0.01em;
      }

      .grid {
        margin-top: 26px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 22px;
      }

      .agent-card {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--card);
        position: relative;
        overflow: hidden;
        box-shadow: 0 12px 30px -26px oklch(0.22 0.02 85 / 0.48);
        transition: transform 0.25s ease, border-color 0.2s ease, box-shadow 0.25s ease;
        display: flex;
        flex-direction: column;
        min-height: 326px;
      }

      .agent-card:hover {
        transform: translateY(-3px);
        border-color: var(--line-strong);
        box-shadow: 0 22px 38px -28px oklch(0.2 0.02 85 / 0.52);
      }

      .agent-card.featured {
        grid-column: span 1;
        background:
          linear-gradient(150deg, oklch(1 0.004 85 / 0.96), oklch(0.985 0.012 80 / 0.94));
      }

      .agent-card.normal {
        grid-column: span 1;
      }

      .card-art {
        position: absolute;
        right: -22px;
        top: -18px;
        width: 150px;
        opacity: 0.35;
      }

      .card-body {
        position: relative;
        z-index: 2;
        padding: 22px;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
      }

      .identity {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        min-width: 0;
      }

      .avatar-btn {
        border: 0;
        padding: 0;
        margin: 0;
        width: 58px;
        height: 58px;
        border-radius: 999px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        border: 2px solid oklch(0.93 0.014 85);
        background: oklch(0.95 0.012 85);
        box-shadow: inset 0 0 0 1px oklch(0.85 0.014 85 / 0.35);
        flex: 0 0 auto;
      }

      .avatar-btn img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .avatar-fallback {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        font-size: 18px;
        color: oklch(0.32 0.018 85);
        font-weight: 700;
        background: radial-gradient(circle at 30% 20%, oklch(0.93 0.03 81), oklch(0.89 0.02 86));
      }

      .avatar-edit {
        position: absolute;
        inset: auto 3px 3px auto;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: oklch(0.28 0.016 85);
        color: #fff;
        border: 1px solid oklch(1 0 0 / 0.35);
      }

      .avatar-edit svg {
        width: 10px;
        height: 10px;
      }

      .title-wrap {
        min-width: 0;
      }

      .name {
        margin: 0;
        font-size: 17px;
        line-height: 1.2;
        letter-spacing: -0.01em;
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .model {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12.5px;
      }

      .default-tag {
        display: inline-flex;
        padding: 2px 6px;
        border-radius: 999px;
        background: oklch(0.95 0.01 85);
        color: oklch(0.37 0.014 85);
        border: 1px solid var(--line);
        font-size: 11px;
      }

      .status-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .signal {
        height: 26px;
        border: 1px solid var(--line);
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 9px;
        background: oklch(1 0.004 85 / 0.84);
        color: var(--muted);
      }

      .signal svg {
        width: 13px;
        height: 13px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
      }

      .dot.on {
        background: var(--ok);
        box-shadow: 0 0 0 4px oklch(0.72 0.17 150 / 0.17);
      }

      .dot.off {
        background: var(--off);
      }

      .dot.warn {
        background: var(--warn);
      }

      .desc {
        margin: 18px 0 14px;
        color: oklch(0.4 0.015 85);
        font-size: 13.5px;
        line-height: 1.65;
        min-height: 76px;
      }

      .memory-chip {
        border: 1px dashed oklch(0.84 0.012 85);
        border-radius: 12px;
        background: oklch(0.99 0.004 85);
        color: oklch(0.43 0.012 85);
        font-size: 12.5px;
        padding: 10px 12px;
      }

      .card-footer {
        margin-top: auto;
        padding-top: 16px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
      }

      .chat-btn {
        border: 0;
        height: 38px;
        border-radius: 11px;
        background: oklch(0.23 0.018 85);
        color: #fff;
        font-size: 13px;
        letter-spacing: 0.01em;
        cursor: pointer;
      }

      .chat-btn:hover {
        opacity: 0.94;
      }

      .icon-actions {
        display: flex;
        gap: 8px;
      }

      .icon-btn {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        color: var(--muted);
        background: oklch(1 0.004 85 / 0.86);
        cursor: pointer;
      }

      .icon-btn svg {
        width: 15px;
        height: 15px;
      }

      .icon-btn.danger {
        color: var(--danger);
      }

      .empty {
        border: 1px dashed var(--line-strong);
        border-radius: 18px;
        padding: 36px;
        text-align: center;
        color: var(--muted);
        background: oklch(1 0.004 85 / 0.7);
        margin-top: 16px;
        display: none;
      }

      .crop-modal {
        position: fixed;
        inset: 0;
        background: oklch(0.2 0.02 85 / 0.52);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 20;
        backdrop-filter: blur(4px);
      }

      .crop-panel {
        width: min(650px, 92vw);
        border-radius: 20px;
        background: oklch(1 0.004 85 / 0.95);
        border: 1px solid var(--line);
        box-shadow: 0 30px 55px -35px oklch(0.2 0.02 85 / 0.7);
        overflow: hidden;
      }

      .crop-header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .crop-title {
        margin: 0;
        font-size: 15px;
      }

      .crop-body {
        padding: 14px 16px 16px;
        display: grid;
        grid-template-columns: 1fr 220px;
        gap: 16px;
      }

      .crop-stage {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: oklch(0.985 0.006 85);
        min-height: 340px;
        display: grid;
        place-items: center;
        position: relative;
      }

      #cropCanvas {
        width: min(340px, 80vw);
        height: min(340px, 80vw);
        border-radius: 14px;
        touch-action: none;
        cursor: grab;
      }

      #cropCanvas.dragging {
        cursor: grabbing;
      }

      .crop-side {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .upload-btn {
        border: 1px solid var(--line);
        background: oklch(1 0.004 85);
        color: var(--text);
        border-radius: 11px;
        height: 36px;
        padding: 0 12px;
        cursor: pointer;
      }

      .zoom-wrap {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: oklch(0.995 0.005 85);
      }

      .zoom-wrap label {
        font-size: 12px;
        color: var(--muted);
      }

      .zoom-wrap input[type="range"] {
        width: 100%;
        margin-top: 8px;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .crop-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        border-top: 1px solid var(--line);
        padding: 12px 16px;
      }

      .btn {
        height: 34px;
        border-radius: 10px;
        padding: 0 12px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        cursor: pointer;
      }

      .btn.primary {
        background: oklch(0.24 0.017 85);
        color: #fff;
      }

      .btn.danger {
        color: var(--danger);
      }

      @media (max-width: 1200px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 820px) {
        .toolbar {
          grid-template-columns: 1fr;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .crop-body {
          grid-template-columns: 1fr;
        }

        .crop-side {
          order: -1;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-art"></div>
    <div class="grain"></div>

    <main class="page">
      <section class="hero">
        <div class="hero-top">
          <div>
            <h1>智能体列表</h1>
            <p>更清晰的结构、更有辨识度的卡片视觉，以及更轻量的信息表达。</p>
          </div>
          <button class="create-btn">+ 新建智能体</button>
        </div>

        <div class="toolbar">
          <label class="search" aria-label="搜索智能体">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M20 20L17 17"></path>
            </svg>
            <input id="searchInput" type="text" placeholder="搜索名称、能力、模型或描述" />
          </label>
          <div class="meta-pills">
            <span class="pill" id="countAll">共 0 个智能体</span>
            <span class="pill">状态以图标提示，不抢主流程</span>
            <span class="pill">支持圆形头像上传与裁剪</span>
          </div>
        </div>
      </section>

      <section class="grid" id="agentGrid"></section>
      <section class="empty" id="emptyState">没有匹配到智能体，换个关键词试试。</section>
    </main>

    <div class="crop-modal" id="cropModal" aria-hidden="true">
      <div class="crop-panel">
        <div class="crop-header">
          <h3 class="crop-title">上传并裁剪圆形头像</h3>
          <button class="btn" id="closeCrop">关闭</button>
        </div>
        <div class="crop-body">
          <div class="crop-stage">
            <canvas id="cropCanvas" width="360" height="360"></canvas>
          </div>
          <aside class="crop-side">
            <input id="fileInput" type="file" accept="image/*" hidden />
            <button class="upload-btn" id="pickImage">选择图片</button>
            <div class="zoom-wrap">
              <label for="zoomRange">缩放</label>
              <input id="zoomRange" type="range" min="1" max="3" step="0.01" value="1" />
            </div>
            <p class="hint">拖拽图片调整位置，最终将输出圆形头像。</p>
            <button class="btn danger" id="removeAvatar">移除头像</button>
          </aside>
        </div>
        <div class="crop-actions">
          <button class="btn" id="cancelCrop">取消</button>
          <button class="btn primary" id="applyCrop">应用头像</button>
        </div>
      </div>
    </div>

    <script>
      const agents = [
        {
          id: "_default",
          name: "默认智能体",
          model: "gpt-5-mini",
          description: "系统默认智能体，负责通用任务分发与稳态响应。",
          memory: "记忆概览：最近 7 天同步了 18 条对话偏好",
          heartbeat: true,
          evolution: true,
          toolGroups: 4,
          featured: true,
          avatar: null,
        },
        {
          id: "researcher",
          name: "Research Planner",
          model: "gpt-5",
          description: "偏策略与研究路径拆解，擅长把模糊问题拆成可执行实验。",
          memory: "记忆概览：研究策略模板 12 条",
          heartbeat: true,
          evolution: false,
          toolGroups: 3,
          featured: true,
          avatar: null,
        },
        {
          id: "ops",
          name: "Ops Guardian",
          model: "gpt-4.1",
          description: "负责发布前检查、回归核验与线上风险提醒。",
          memory: "记忆概览：发布规则 5 条",
          heartbeat: true,
          evolution: true,
          toolGroups: 2,
          featured: false,
          avatar: null,
        },
        {
          id: "writer",
          name: "Content Maker",
          model: "deepseek-v3",
          description: "负责文案生成、内容重写与结构化表达。",
          memory: "记忆概览：品牌语气词 26 条",
          heartbeat: false,
          evolution: false,
          toolGroups: 1,
          featured: false,
          avatar: null,
        },
        {
          id: "coder",
          name: "Code Reviewer",
          model: "claude-3.7-sonnet",
          description: "重点关注可维护性、边界条件和回归风险。",
          memory: "记忆概览：代码规范偏好 33 条",
          heartbeat: true,
          evolution: true,
          toolGroups: 6,
          featured: false,
          avatar: null,
        },
        {
          id: "designer",
          name: "UI Director",
          model: "gpt-5-mini",
          description: "负责视觉一致性、组件复用策略和交互层级优化。",
          memory: "记忆概览：组件设计规则 9 条",
          heartbeat: false,
          evolution: true,
          toolGroups: 2,
          featured: false,
          avatar: null,
        },
      ];

      const grid = document.getElementById("agentGrid");
      const searchInput = document.getElementById("searchInput");
      const countAll = document.getElementById("countAll");
      const emptyState = document.getElementById("emptyState");

      function icon(name) {
        const map = {
          heartbeat:
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 12h4l2-4 4 8 2-4h6"/></svg>',
          evolution:
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3v18M5 10l7-7 7 7M5 14l7 7 7-7"/></svg>',
          tools:
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M20 7.5a4.5 4.5 0 0 1-6.35 4.1L8.9 16.35A4.5 4.5 0 1 1 7.65 15.1l4.75-4.75A4.5 4.5 0 1 1 20 7.5z"/></svg>',
          memory:
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 5c-3 0-5.5 2.2-5.5 5v3h11v-3c0-2.8-2.5-5-5.5-5z"/><path d="M7 13v4a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-4"/></svg>',
          settings:
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0 .05-.8l2-1.4-2-3.4-2.3.5a7 7 0 0 0-1.4-.8L13.8 3h-3.6l-.5 2.3a7 7 0 0 0-1.4.8l-2.3-.5-2 3.4 2 1.4A7 7 0 0 0 5 12c0 .27.02.53.05.8l-2 1.4 2 3.4 2.3-.5c.43.32.9.6 1.4.8l.5 2.3h3.6l.5-2.3c.5-.2.97-.48 1.4-.8l2.3.5 2-3.4-2-1.4z"/></svg>',
          delete:
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/><path d="M10 10v7M14 10v7"/></svg>',
          camera:
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8h3l2-2h6l2 2h3v10H4z"/><circle cx="12" cy="13" r="3.2"/></svg>',
        };
        return map[name] || "";
      }

      function avatarMarkup(agent) {
        const initial = (agent.name || "A").slice(0, 1).toUpperCase();
        if (agent.avatar) {
          return `<img src="${agent.avatar}" alt="${agent.name} avatar" />`;
        }
        return `<div class="avatar-fallback">${initial}</div>`;
      }

      function cardArt() {
        return `
          <svg class="card-art" viewBox="0 0 160 160" fill="none" aria-hidden="true">
            <path d="M22 73c26-32 87-39 112-8" stroke="oklch(0.63 0.03 83 / 0.7)" stroke-width="1.4"/>
            <path d="M18 91c31-22 85-18 124 6" stroke="oklch(0.71 0.02 87 / 0.7)" stroke-width="1.4"/>
            <circle cx="118" cy="44" r="20" stroke="oklch(0.72 0.02 85 / 0.5)" stroke-width="1.2"/>
          </svg>
        `;
      }

      function renderCards() {
        const keyword = searchInput.value.trim().toLowerCase();
        const filtered = agents.filter((agent) => {
          if (!keyword) return true;
          return (
            agent.name.toLowerCase().includes(keyword)
            || agent.description.toLowerCase().includes(keyword)
            || (agent.model || "").toLowerCase().includes(keyword)
          );
        });

        countAll.textContent = `共 ${filtered.length} 个智能体`;
        emptyState.style.display = filtered.length ? "none" : "block";

        grid.innerHTML = filtered
          .map((agent) => {
            const cardType = "normal";
            return `
              <article class="agent-card ${cardType}">
                ${cardArt()}
                <div class="card-body">
                  <div class="card-head">
                    <div class="identity">
                      <button class="avatar-btn" data-avatar-edit="${agent.id}" title="上传或裁剪头像">
                        ${avatarMarkup(agent)}
                        <span class="avatar-edit">${icon("camera")}</span>
                      </button>
                      <div class="title-wrap">
                        <h3 class="name">
                          ${agent.name}
                          ${agent.id === "_default" ? '<span class="default-tag">默认</span>' : ""}
                        </h3>
                        <div class="model">${agent.model}</div>
                      </div>
                    </div>

                    <div class="status-row">
                      <span class="signal" title="Heartbeat 状态">
                        ${icon("heartbeat")}
                        <span class="dot ${agent.heartbeat ? "on" : "off"}"></span>
                      </span>
                      <span class="signal" title="Evolution 状态">
                        ${icon("evolution")}
                        <span class="dot ${agent.evolution ? "on" : "off"}"></span>
                      </span>
                      <span class="signal" title="工具组数量 ${agent.toolGroups}">
                        ${icon("tools")}
                        <span class="dot ${agent.toolGroups > 0 ? "warn" : "off"}"></span>
                      </span>
                    </div>
                  </div>

                  <p class="desc">${agent.description}</p>
                  <div class="memory-chip">${agent.memory}</div>

                  <footer class="card-footer">
                    <button class="chat-btn">进入对话</button>
                    <div class="icon-actions">
                      <button class="icon-btn" title="记忆">${icon("memory")}</button>
                      <button class="icon-btn" title="设置">${icon("settings")}</button>
                      ${
                        agent.id === "_default"
                          ? ""
                          : `<button class="icon-btn danger" title="删除">${icon("delete")}</button>`
                      }
                    </div>
                  </footer>
                </div>
              </article>
            `;
          })
          .join("");

        bindAvatarEdit();
      }

      searchInput.addEventListener("input", renderCards);

      const cropModal = document.getElementById("cropModal");
      const closeCrop = document.getElementById("closeCrop");
      const cancelCrop = document.getElementById("cancelCrop");
      const applyCrop = document.getElementById("applyCrop");
      const removeAvatar = document.getElementById("removeAvatar");
      const pickImage = document.getElementById("pickImage");
      const fileInput = document.getElementById("fileInput");
      const cropCanvas = document.getElementById("cropCanvas");
      const zoomRange = document.getElementById("zoomRange");
      const ctx = cropCanvas.getContext("2d");

      let activeAgentId = null;
      let image = null;
      let state = { x: 0, y: 0, scale: 1 };
      let dragging = false;
      let start = { x: 0, y: 0, originX: 0, originY: 0 };

      function openCrop(agentId) {
        activeAgentId = agentId;
        cropModal.style.display = "flex";
        cropModal.setAttribute("aria-hidden", "false");

        const agent = agents.find((item) => item.id === agentId);
        if (agent && agent.avatar) {
          const img = new Image();
          img.onload = () => {
            image = img;
            initTransform();
            drawCrop();
          };
          img.src = agent.avatar;
        } else {
          image = null;
          drawEmptyStage();
        }
      }

      function closeCropModal() {
        cropModal.style.display = "none";
        cropModal.setAttribute("aria-hidden", "true");
      }

      function drawEmptyStage() {
        ctx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
        ctx.fillStyle = "#f5f3ef";
        ctx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);
        ctx.fillStyle = "#7f7a70";
        ctx.font = '14px "Noto Sans SC", sans-serif';
        ctx.textAlign = "center";
        ctx.fillText("请先选择图片", cropCanvas.width / 2, cropCanvas.height / 2);
      }

      function initTransform() {
        if (!image) return;
        const coverScale = Math.max(cropCanvas.width / image.width, cropCanvas.height / image.height);
        state.scale = coverScale;
        state.x = (cropCanvas.width - image.width * state.scale) / 2;
        state.y = (cropCanvas.height - image.height * state.scale) / 2;
        zoomRange.value = "1";
      }

      function drawCrop() {
        if (!ctx) return;
        ctx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);

        if (!image) {
          drawEmptyStage();
          return;
        }

        ctx.fillStyle = "#f5f3ef";
        ctx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);
        ctx.drawImage(image, state.x, state.y, image.width * state.scale, image.height * state.scale);

        ctx.save();
        ctx.fillStyle = "rgba(24, 23, 21, 0.42)";
        ctx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);
        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.arc(cropCanvas.width / 2, cropCanvas.height / 2, cropCanvas.width / 2 - 22, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.beginPath();
        ctx.arc(cropCanvas.width / 2, cropCanvas.height / 2, cropCanvas.width / 2 - 22, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255,255,255,0.95)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      function bindAvatarEdit() {
        document.querySelectorAll("[data-avatar-edit]").forEach((node) => {
          node.addEventListener("click", () => {
            openCrop(node.getAttribute("data-avatar-edit"));
          });
        });
      }

      function applyZoomFactor(factor) {
        if (!image) return;
        const centerX = cropCanvas.width / 2;
        const centerY = cropCanvas.height / 2;
        const prevScale = state.scale;
        const nextScale = Math.max(0.05, prevScale * factor);
        const ratio = nextScale / prevScale;
        state.x = centerX - (centerX - state.x) * ratio;
        state.y = centerY - (centerY - state.y) * ratio;
        state.scale = nextScale;
        drawCrop();
      }

      pickImage.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          image = img;
          initTransform();
          drawCrop();
          URL.revokeObjectURL(url);
        };
        img.src = url;
      });

      zoomRange.addEventListener("input", (event) => {
        if (!image) return;
        const value = Number(event.target.value);
        const factor = value / (Number(zoomRange.dataset.prev) || 1);
        zoomRange.dataset.prev = String(value);
        applyZoomFactor(factor);
      });
      zoomRange.dataset.prev = "1";

      cropCanvas.addEventListener("pointerdown", (event) => {
        if (!image) return;
        dragging = true;
        cropCanvas.classList.add("dragging");
        start.x = event.clientX;
        start.y = event.clientY;
        start.originX = state.x;
        start.originY = state.y;
        cropCanvas.setPointerCapture(event.pointerId);
      });

      cropCanvas.addEventListener("pointermove", (event) => {
        if (!dragging) return;
        state.x = start.originX + (event.clientX - start.x);
        state.y = start.originY + (event.clientY - start.y);
        drawCrop();
      });

      function stopDrag(event) {
        if (!dragging) return;
        dragging = false;
        cropCanvas.classList.remove("dragging");
        if (event?.pointerId !== undefined) {
          cropCanvas.releasePointerCapture(event.pointerId);
        }
      }

      cropCanvas.addEventListener("pointerup", stopDrag);
      cropCanvas.addEventListener("pointercancel", stopDrag);

      closeCrop.addEventListener("click", closeCropModal);
      cancelCrop.addEventListener("click", closeCropModal);

      removeAvatar.addEventListener("click", () => {
        if (!activeAgentId) return;
        const target = agents.find((a) => a.id === activeAgentId);
        if (!target) return;
        target.avatar = null;
        renderCards();
        closeCropModal();
      });

      applyCrop.addEventListener("click", () => {
        if (!image || !activeAgentId) {
          closeCropModal();
          return;
        }

        const outSize = 256;
        const outCanvas = document.createElement("canvas");
        outCanvas.width = outSize;
        outCanvas.height = outSize;
        const out = outCanvas.getContext("2d");

        out.beginPath();
        out.arc(outSize / 2, outSize / 2, outSize / 2, 0, Math.PI * 2);
        out.clip();

        const ratio = outSize / cropCanvas.width;
        out.drawImage(
          image,
          state.x * ratio,
          state.y * ratio,
          image.width * state.scale * ratio,
          image.height * state.scale * ratio,
        );

        const png = outCanvas.toDataURL("image/png");
        const target = agents.find((a) => a.id === activeAgentId);
        if (target) {
          target.avatar = png;
        }

        renderCards();
        closeCropModal();
      });

      cropModal.addEventListener("click", (event) => {
        if (event.target === cropModal) {
          closeCropModal();
        }
      });

      renderCards();
      drawEmptyStage();
    </script>
  </body>
</html>
